<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>链接不存在</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="redirect-page">
    <div class="container">
        <header>
            <h1>ShortLinks</h1>
            <button id="theme-toggle" class="theme-btn">🌙</button>
        </header>
        
        <main>
            <section class="redirect-content">
                <div class="countdown-container">
                    <div class="error-icon">🔗</div>
                    <div class="error-title">链接不存在</div>
                    <p>抱歉，您访问的短链接不存在或已失效</p>
                </div>
                
                <div class="link-info">
                    <p>您访问的链接: <span id="short-link"></span></p>
                </div>
                
                <button id="home-btn" class="redirect-btn" onclick="window.location.href='/'">返回首页</button>
            </section>
        </main>
        
        <footer>
            <p>&copy; 2026 比特火炬-短链接服务</p>
        </footer>
    </div>
    
    <script src="../js/theme.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const shortLinkElement = document.getElementById('short-link');
            if (shortLinkElement) {
                const urlParams = new URLSearchParams(window.location.search);
                const idFromQuery = urlParams.get('id');
                if (idFromQuery) {
                    shortLinkElement.textContent = window.location.href;
                } else {
                    shortLinkElement.textContent = window.location.href;
                }
            }
        });
    </script>
</body>
</html>
