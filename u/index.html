<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跳转中...</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!-- 背景装饰 -->
    <div class="background-decor"></div>
    
    <div class="container">
        <header class="header">
            <div class="logo">
                <h1>BIT<span class="accent">LINK</span></h1>
                <p class="tagline">比特火炬</p>
            </div>
            <button id="theme-toggle" class="theme-btn">
                <span class="theme-icon">🌙</span>
            </button>
        </header>
        
        <main>
            <section class="redirect-content">
                <div class="countdown-container">
                    <div class="countdown" id="countdown">3</div>
                    <p>秒后将自动跳转至目标页面...</p>
                </div>
                
                <div class="link-info">
                    <p>短链接: <span id="short-link"></span></p>
                </div>
                
                <button id="redirect-btn" class="redirect-btn">立即跳转</button>
                
                <div id="error-message" class="error-message"></div>
            </section>
        </main>
        
        <footer class="footer">
            <div class="footer-content">
                <div class="footer-logo">
                    <h3>BIT<span class="accent">LINK</span></h3>
                </div>
                <p class="footer-copyright">&copy; 2026 比特火炬 - 短链接服务</p>
                <div class="footer-links">
                    <a href="#" class="footer-link">关于我们</a>
                    <a href="#" class="footer-link">使用条款</a>
                    <a href="#" class="footer-link">隐私政策</a>
                </div>
            </div>
        </footer>
    </div>
    
    <script src="../js/theme.js"></script>
    <script src="../js/redirect.js"></script>
</body>
</html>
