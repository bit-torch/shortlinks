<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>比特火炬-短链接重定向服务</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>SHORTLINK</h1>
            <button id="theme-toggle" class="theme-btn">🌙</button>
        </header>
        
        <main>
            <section class="hero">
                <h2>比特火炬-短链接服务</h2>
                <p>快速、安全、美观的链接重定向解决方案</p>
                <div class="grid">
                    <div class="feature">
                        <div class="feature-icon">🔗</div>
                        <h3>简洁URL</h3>
                        <p>生成短而美观的链接</p>
                    </div>
                    <div class="feature">
                        <div class="feature-icon">⏱️</div>
                        <h3>3秒跳转</h3>
                        <p>访问后自动跳转</p>
                    </div>
                    <div class="feature">
                        <div class="feature-icon">🔒</div>
                        <h3>安全加密</h3>
                        <p>目标URL加密存储</p>
                    </div>
                </div>
            </section>
            
            <section class="usage">
                <h2>使用方式</h2>
                <code>s.1378091.xyz/u/?id={8-12位随机字符}</code>
                <p>访问上述格式的链接，将在3秒后跳转到目标页面</p>
            </section>
        </main>
        
        <footer>
            <p>&copy; 2026 比特火炬-短链接服务</p>
        </footer>
    </div>
    
    <script src="js/theme.js"></script>
